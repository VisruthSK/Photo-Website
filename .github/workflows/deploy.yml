name: Build and Deploy Hugo Site to deploy Branch

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the main branch
  push:
    branches:
      - main  # Or master, or whichever is your primary source branch

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build-and-deploy"
  build-and-deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN permissions to write contents
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checkout the source code (main branch)
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (if using submodules)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      # 2. Setup Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3 # Use the latest version of this action
        with:
          hugo-version: 'latest' # Or specify your exact Hugo version e.g., '0.119.0'
          extended: true # Uncomment if you need the extended version (for Sass/SCSS)

      # 3. Build the Hugo site
      - name: Build Site
        run: hugo --minify # Add any other build flags you need e.g., --baseURL $URL

      # 4. Deploy built site to the deploy branch
      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4 # Use the latest version of this action
        with:
          # Automatically uses the GITHUB_TOKEN supplied by Actions
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The branch name where you want to push the built site
          publish_branch: deploy
          # The directory containing the built site (Hugo's default is public)
          publish_dir: ./public
          # Use the commit message from the push that triggered the workflow
          commit_message: ${{ github.event.head_commit.message }}
          # Optional: Force push without keeping history on the deploy branch
          # This is common for build artifact branches to keep them clean
          force_orphan: true
          # Optional: Configure the committer identity
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'